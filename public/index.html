<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            margin:0;
            min-height: 100vh;
            height: 100vh;
        }
        form{ 
           display: none;
           position: fixed;   
           top: 50%;
           left: 50%;
           transform: translate(-50%, -50%);
           z-index: 1000;

           background: white;
           padding: 30px;
           border-radius: 10px;
           width: 350px;
           box-shadow: 0px 0px 10px rgba(0,0,0,0.2); }
      .button-Container {
            position:absolute;
            top:20px;
            right:20px;
            display:flex;
            gap:10px;
          }

     .button-Container button{
            padding:10px 20px;
            margin-left:10px;
            border:none;
            background:green;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

     .button-Container button:hover{
               opacity:0.9;
                background:#0d523b;
       }

        

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            border: none;
            background: green;
            color: azure;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        
   .welcome-container{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: 500px;
}

.center-image{
    width: 250px;
    height: 150px;
    border-radius:none;
  
   }
   .page{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
hr{
    margin: 20px auto;
    width: 80%;
    border: 1px solid #ddd;
}

.greetings{
    font-size: 20px;
    font-weight: bold;
    color: green;
    margin-bottom: 15px;
}
.welcome-paragraph{
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    width: 90%;
    margin: auto;
    
}

.button-Container{
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
}



    </style>
</head>

<body>
 
<div class="page">
  <div class="welcome-container">

    <img src="logo.webp" alt="Welcome" class="center-image">

  
    <hr>

   
    <div class="greetings">
        <span>Welcome</span> |
        <span>Re a go amogela</span> |
        <span>Amukeriwile</span> |
        
    </div>

  
    <p class="welcome-paragraph">
        Welcome to IMS platform. We are delighted to have you here.
        Please register or login to continue and explore our services.
    </p>

</div>

     <div class="button-Container">
        <button onclick="showForm('register')">Register</button>
        <button onclick="showForm('login')">Login</button>
     </div>

    </div>

      

           <form id="loginForm" style="display:none;" >
                <h2>Login</h2>

         <input type="email" name="email" placeholder="Email" required>
         <input type="password" name="password" placeholder="password" required>

         <button type="submit">Login</button>

    </form>
  

    <form id="registerForm" style="display:none;">
            <h2>Register</h2>
        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <input type="text" name="empname" placeholder="First Name" required>

        <input type="text" name="surname" placeholder="Surname" required>

        <input type="text" name="department" placeholder="Department" required>

        <input type="text" name="contact" placeholder="Contact" required>

        <input type="text" name="mentor" placeholder="Manager" required>

        <input type="text" name="gender" placeholder="Gender" required>

        <button type="submit">Register</button>

    </form>

</div>

<script>

const API_URL = "http://localhost:3000";


function showForm(type){

    const registerForm= document.getElementById("registerForm");

    const loginForm= document.getElementById("loginForm");


    registerForm.style.display ="none";
    loginForm.style.display ="none";


    if(type === "register"){

        registerForm.style.display ="block";

    }else if(type === "login"){
        loginForm.style.display ="block";
    }


}

document.getElementById("loginForm").addEventListener("submit",  async function(e)  {
    
     e.preventDefault();


     const formData = new FormData(this);

     const data = {
        email: formData.get("email"),
        password:formData.get("password")
     };

      console.log("LOGIN DATA:", data);

    try{
        const res = await fetch(`${API_URL}/login`,{

            method:"POST",
            headers:{"Content-Type" : "Application/json"},
            body:JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            console.log("LOGIN RESPONSE:", data);

            if (data.token) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("role", data.role);
              
                alert("Login Successful!")
               
                 if(data.role === "intern"){

                    window.location.href ="intern.html";

                 } else if(data.role === "supervisor"){
                    window.location.href ="supervisor.html";

                 } else if(data.role === "admin"){
                    window.location.href ="admin.html";

                 }else{
                    alert("Unknown Role");
                 }

                }else{
                     alert(data.message || "Login Failed");

            }
        })

    }catch(error){
          console.error("LOGIN ERROR:", error);

        alert("Server not reachable");
    }
    });

document.getElementById("registerForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const formData = new FormData(this);

    const data = {
        email: formData.get("email"),
        password: formData.get("password"),
        empname: formData.get("empname"),
        surname: formData.get("surname"),
        department: formData.get("department"),
        contact: formData.get("contact"),
        mentor: formData.get("mentor"),
        gender: formData.get("gender")
    };

    console.log("REGISTER DATA:", data);

    try{

        const res = await fetch(`${API_URL}/register`, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(data)

        });

        const result = await res.json();

        console.log("REGISTER RESPONSE:", result);

        if(res.ok){

            alert(result.message || "Registration successful");

            document.getElementById("registerForm").reset();

        } else {

            alert(result.message || "Registration failed");

        }

    } catch(error){

        console.error("REGISTER ERROR:", error);

        alert("Server not reachable");

    }

});

</script>

</body>
</html>
